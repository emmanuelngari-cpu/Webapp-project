<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Team - La Trattoria</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        .navbar { background: linear-gradient(135deg, #b71c1c, #8e0000); }
        .staff-card { transition: all 0.3s; }
        .staff-card:hover { transform: scale(1.05); }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top"> ... (same navbar as above) </nav>

    <section class="py-5">
        <div class="container">
            <h2 class="text-center mb-5">Meet Our Team</h2>
            <div class="row">
                <div class="col-md-4 mb-4">
                    <div class="card staff-card">
                        <img src="https://picsum.photos/id/64/400/300" class="card-img-top" alt="Chef Marco">
                        <div class="card-body">
                            <h5>Chef Marco Rossi</h5>
                            <p class="text-muted">Executive Chef & Owner</p>
                            <p>With 25 years experience in Michelin-starred kitchens across Italy and New York.</p>
                        </div>
                    </div>
                </div>
                <!-- Add more staff cards similarly -->
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
