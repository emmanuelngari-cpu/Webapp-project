<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - La Trattoria</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        .navbar { background: linear-gradient(135deg, #b71c1c, #8e0000); }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top"> ... (same navbar) </nav>

    <section class="py-5">
        <div class="container">
            <h2 class="text-center mb-5">Get in Touch</h2>
            <div class="row">
                <div class="col-lg-6">
                    <form id="contactForm">
                        <div class="mb-3"><input type="text" class="form-control" placeholder="Your Name" required></div>
                        <div class="mb-3"><input type="email" class="form-control" placeholder="Email" required></div>
                        <div class="mb-3"><input type="tel" class="form-control" placeholder="Phone"></div>
                        <div class="mb-3"><textarea class="form-control" rows="5" placeholder="Your Message" required></textarea></div>
                        <button type="submit" class="btn btn-danger btn-lg">Send Message</button>
                    </form>
                </div>
                <div class="col-lg-6">
                    <h5>Visit Us</h5>
                    <p>123 Italian Lane, Downtown<br>Phone: (555) 123-4567<br>Email: reservations@latrattoria.com</p>
                    <h5>Opening Hours</h5>
                    <p>Tue–Sun: 11:00 AM – 10:00 PM<br>Monday: Closed</p>
                </div>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('contactForm').addEventListener('submit', function(e) {
            e.preventDefault();
            alert("Thank you! Your reservation request has been received. We'll contact you shortly.");
        });
    </script>
</body>
</html>
